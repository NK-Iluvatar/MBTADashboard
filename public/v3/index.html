<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, minimum-scale=1"
        />
        <title>PLT-Boston Transit Dashboard</title>
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <!-- ================= WEATHER ================= -->
        <div id="weather-box" class="weather-box"></div>

        <div class="dashboard">
            <!-- col 1 rows 1-2: South Station (Red + CR combined) -->
            <div id="south-station"></div>

            <!-- col 2 row 1: State Street -->
            <div id="state-station-orange">
                <div class="predictions"></div>
            </div>

            <!-- col 2 row 2: North Station CR -->
            <div class="north-station-cr">
                <div class="predictions"></div>
            </div>

            <!-- col 1 row 3: Park Street -->
            <div id="park-street-green">
                <div class="predictions"></div>
            </div>

            <!-- col 2 row 3: Ferry -->
            <div class="ferry">
                <div class="predictions"></div>
            </div>

            <!-- col 1 row 4: Blue Bikes -->
            <div id="bluebikes-box"></div>

            <!-- col 2 row 4: News -->
            <div id="news-box"></div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
