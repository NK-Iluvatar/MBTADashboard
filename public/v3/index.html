<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, minimum-scale=1"
        />
        <title>PLT-Boston Transit Dashboard</title>
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <!-- ================= WEATHER ================= -->
        <div id="weather-box" class="weather-box"></div>

        <div class="dashboard">
            <!-- ================= ROW 1: Red | Orange+Blue ================= -->
            <div id="south-station-red">
                <div class="predictions"></div>
            </div>
            <div id="state-station-orange">
                <div class="predictions"></div>
            </div>

            <!-- ================= ROW 2: South CR | North CR ================= -->
            <div class="south-station-cr">
                <div class="predictions"></div>
            </div>
            <div class="north-station-cr">
                <div class="predictions"></div>
            </div>

            <!-- ================= ROW 3: Green | Ferry ================= -->
            <div id="park-street-green">
                <div class="predictions"></div>
            </div>
            <div class="ferry">
                <div class="predictions"></div>
            </div>

            <!-- ================= ROW 4: Blue Bikes | News ================= -->
            <div id="bluebikes-box"></div>
            <div id="news-box"></div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
